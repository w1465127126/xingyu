<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兴羽体育 · 扫码进入</title>
<style>
  :root {
    --bg: #0a0e17;
    --gold: #c8a45c;
    --gold-bright: #e4c87c;
    --gold-dim: #8b7340;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0e17;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .card {
    position: relative;
    background: linear-gradient(160deg, #111827 0%, #0f1623 40%, #111827 100%);
    border: 1px solid rgba(200,164,92,0.25);
    border-radius: 20px;
    padding: 44px 44px 36px;
    text-align: center;
    box-shadow:
      0 0 0 6px rgba(200,164,92,0.04),
      0 0 0 12px rgba(200,164,92,0.02),
      0 8px 40px rgba(0,0,0,0.5);
  }

  /* decorative corners */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--gold-dim);
    border-style: solid;
  }
  .card::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
    border-radius: 20px 0 0 0;
  }
  .card::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 20px 0;
  }

  .inner-card {
    position: relative;
    border: 2px solid rgba(200,164,92,0.2);
    border-radius: 14px;
    padding: 28px 28px 22px;
    background: #fff;
    display: inline-block;
  }
  .inner-card::before, .inner-card::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--gold);
    border-style: solid;
  }
  .inner-card::before {
    top: 6px; left: 6px;
    border-width: 1.5px 0 0 1.5px;
  }
  .inner-card::after {
    bottom: 6px; right: 6px;
    border-width: 0 1.5px 1.5px 0;
  }

  .inner-card img {
    display: block;
    width: 280px; height: 280px;
    border-radius: 4px;
  }

  .brand-row {
    margin-top: 24px;
    display: flex; align-items: center; justify-content: center;
    gap: 14px;
  }
  .dot { width:5px; height:5px; background:var(--gold); border-radius:50%; }
  .line-h { flex:1; height:1px; background:rgba(200,164,92,0.2); max-width:50px; }

  .brand-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px; font-weight: 900;
    color: #e8e4dd;
    letter-spacing: 3px;
  }
  .brand-sub {
    font-size: 12px; color: #979590;
    letter-spacing: 4px;
    margin-top: 6px;
  }

  .slogan-row {
    margin-top: 18px;
    padding: 10px 20px;
    border: 1px dashed rgba(200,164,92,0.2);
    border-radius: 4px;
    display: inline-block;
  }
  .slogan-row span {
    font-size: 13px; color: var(--gold-bright);
    letter-spacing: 2px;
  }

  .tip {
    margin-top: 18px;
    font-size: 12px; color: #5e5c56;
    letter-spacing: 3px;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
  <div class="inner-card">
    <img src="qrcode.png" alt="扫码进入兴羽体育" width="280" height="280">
  </div>

  <div class="brand-row">
    <span class="line-h"></span><span class="dot"></span><span class="line-h"></span>
  </div>

  <div class="brand-name">兴羽体育</div>
  <div class="brand-sub">羽毛球穿线价目表</div>

  <div class="slogan-row">
    <span>匠心穿线 · 精益求精 · 品质保障</span>
  </div>

  <div class="tip">微信扫码 · 即刻访问</div>
</div>

</body>
</html>
